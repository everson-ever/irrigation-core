services:
  scheduler:
    build:
      context: .
    image: irrigation-system-dev
    init: true
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /app
    command: /opt/venv/bin/irrigation run
    environment:
      TZ: "${TZ:-America/Fortaleza}"
      IRRIGATION_DATA_DIR: /app/data
      IRRIGATION_GPIO_DRIVER: mock
      IRRIGATION_PUMP_PIN: 15
      IRRIGATION_POLL_INTERVAL: 5
    volumes:
      - .:/app

  node-red:
    image: irrigation-system-dev
    init: true
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /app
    command:
      - sh
      - -c
      - >
        python3 scripts/sync_flows_templates.py &&
        exec node-red
        --userDir /node-red-data
        --flowFile /app/node-red/flows.json
        --settings /app/node-red/settings.js
    depends_on:
      - scheduler
    environment:
      TZ: "${TZ:-America/Fortaleza}"
      IRRIGATION_DATA_DIR: /app/data
      IRRIGATION_GPIO_DRIVER: mock
      IRRIGATION_PUMP_PIN: 15
      IRRIGATION_POLL_INTERVAL: 5
    ports:
      - "1880:1880"
    volumes:
      - .:/app
